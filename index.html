<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>幸运增量</title>
    <link rel="stylesheet" href="style.css">
    <script src="OmegaNum.js"></script>
</head>

<body>
    <div class="game-container">
        <div class="top-area">
            <div class="luck-points">你有<span id="luckValue">0</span>幸运点</div>
            <div class="draw-result">
                <div class="line1">你抽到了</div>
                <div class="line2" id="lastDrawDisplay">—</div>
            </div>
        </div>

        <div id="notification-area" class="notification-area"></div>

        <div class="tab-area">
            <button class="tab-btn active" data-panel="home">主页</button>
            <button class="tab-btn" data-panel="stats">统计</button>
            <button class="tab-btn" data-panel="achievements">成就</button>
            <button class="tab-btn" data-panel="settings">设置</button>
        </div>

        <div id="homePanel" class="panel">
            <button id="drawButton" class="draw-btn">抽取随机数</button>
            <div class="upgrade-area">
                <div class="upgrade-item">
                    <div id="luckUpgrade" class="upgrade-title">达到2σ以解锁幸运升级</div>
                    <div class="upgrade-container" id="luckUpgradeBlock" style="display: none;">
                        <div class="luck-stat">幸运乘数：×<span id="luckyFactorVal">1</span></div>
                        <button id="increaseLuckyBtn" class="lucky-btn">×1.1</button>

                        <div class="upgrade locked" id="expUpgradeBlock">
                            <div class="mask">达到10σ后解锁</div>
                            <div class="upgrade-stat">
                                <div class="upgrade-desc">
                                    <span class="upgrade-name" id="exponentName">幸运升级(0)</span>
                                    <span id="exponentDesc">每次点击增加的幸运乘数^1</span>
                                </div>
                                <button id="buyExpUpgradeBtn" class="upgrade-btn disabled">花费：100幸运点</button>
                                <button id="buyMaxExpUpgradeBtn" class="upgrade-btn max disabled">购买最大</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="upgrade-item">
                    <div id="sigmaUpgrade" class="upgrade-title">达到45σ以解锁标准差升级</div>
                    <div class="upgrade-container" id="sigUpgradeBlock" style="display: none;">
                        <div class="luck-stat">σ: <span id="sigmaVal">1</span></div>

                        <div class="upgrade">
                            <div class="upgrade-stat">
                                <div class="upgrade-desc">
                                    <span class="upgrade-name" id="sigmaName">标准差升级(0)</span>
                                    <span id="sigmaDesc">σ×1</span>
                                </div>
                                <button id="buySigUpgradeBtn" class="upgrade-btn disabled">花费：1500幸运点</button>
                                <button id="buyMaxSigUpgradeBtn" class="upgrade-btn max disabled">购买最大</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="statsPanel" class="panel hide">
            <div class="stats-grid">
                <div class="total-title">总计</div>
                <div class="stat-card">游戏时间: <span id="gameTime">0s</span></div>
                <div class="stat-card">总共获取的幸运点: <span id="totalLuck">0</span></div>
                <div class="stat-card">单次最高获取的幸运点: <span id="maxSingle">0</span></div>
                <div class="stat-card">最幸运抽取: <span id="luckiestRecord">-</span></div>
                <div class="stat-card">总抽取次数: <span id="totalDraws">0</span></div>
            </div>
        </div>

        <div id="achievementsPanel" class="panel hide">
            <div class="subtab-area">
                <button class="subtab-btn active" data-subtab="normal">成就</button>
                <button class="subtab-btn" data-subtab="hidden">隐藏成就</button>
            </div>
            <div id="normalAchievementsPanel" class="subtab">
                <div id="normalAch" class="ach-grid"></div>
            </div>
            <div id="hiddenAchievementsPanel" class="subtab hide">
                <div id="hiddenAch" class="ach-grid"></div>
            </div>

        </div>

        <div id="settingsPanel" class="panel hide">
            <div class="setting-row">
                <button id="saveGameBtn">保存</button>
                <button id="exportFileBtn">导出文件</button>
                <button id="importFileInputBtn">导入文件</button>
                <input type="file" id="importFileInput" style="display: none;" accept=".json">
                <button id="importFromTextBtn">导入文本</button>
                <button id="exportToClipBtn">导出到剪贴板</button>
            </div>
            <div class="setting-row">
                <button id="hardResetBtn" class="danger-btn">硬重置</button>
            </div>
        </div>

        <div id="modal" class="modal" style="display: none;">
            <div class="import-panel">
                <div class="tip">粘贴 JSON 存档内容：</div>
                <textarea id="textarea" placeholder="在此粘贴存档字符串..."></textarea>
                <div class="btn-bar">
                    <button id="importBtn" class="import-btn">导入</button>
                    <button id="cancelBtn" class="cancel-btn">取消</button>
                </div>
            </div>
        </div>

        <div class="version">v0.0</div>
    </div>

    <script src="utils.js"></script>
    <script src="game-state.js"></script>
    <script src="ui-handler.js"></script>
    <script src="achievements.js"></script>
    <script src="main.js"></script>
</body>

</html>
